<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrihind EE</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elektrihind">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #080d16;
    --surface: #101827;
    --border: #1c2f48;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #5eaeff;
    --text: #ddeeff;
    --muted: #4a6a8a;
    --cheap: #00e5a0;
    --mid: #f0c040;
    --expensive: #ff5555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Current price hero */
  .hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .current-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .current-price {
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1;
    transition: color 0.5s;
  }

  .current-unit {
    font-size: 18px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 4px;
  }

  .current-time {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .price-tag {
    text-align: right;
  }

  .price-level {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid;
    margin-bottom: 8px;
    display: inline-block;
  }

  .change {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* Cost mode toggle */
  .tomorrow-msg {
    display: none;
    align-items: center;
    justify-content: center;
    min-height: 140px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #5eaeff;
    letter-spacing: 0.2px;
    text-align: center;
    padding: 24px;
  }

  .cost-toggle {
    display: flex;
    background: rgba(94,174,255,0.07);
    border: 1px solid rgba(94,174,255,0.12);
    border-radius: 14px;
    padding: 4px;
    gap: 3px;
    margin-bottom: 22px;
    max-width: 340px;
  }
  .cost-btn {
    flex: 1;
    padding: 11px 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(.4,0,.2,1);
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .cost-btn.active {
    background: linear-gradient(135deg, #1a3a6e, #102244);
    color: #5eaeff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(94,174,255,0.15);
  }
  .cost-breakdown {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(94,174,255,0.55);
    letter-spacing: 0.5px;
    margin-top: 6px;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .stat-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Chart */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .chart-wrap {
    position: relative;
    height: 200px;
  }

  canvas#priceChart {
    width: 100% !important;
    height: 200px !important;
  }

  /* Hourly list */
  .hours-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .hours-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
    margin-top: 20px;
  }

  .hour-cell {
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    border: 1px solid transparent;
    cursor: default;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }

  .hour-cell:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.1);
  }

  .hour-cell.current-hour {
    border-color: var(--accent) !important;
    box-shadow: 0 0 12px rgba(0,229,160,0.2);
  }

  .hour-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .hour-price {
    font-size: 13px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 16px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,68,68,0.1);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 12px;
    padding: 20px;
    color: #ff8888;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-align: center;
  }

  .info-note {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
    line-height: 1.6;
  }

  .next-hours {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: nowrap;
  }

  .next-hour-card {
    flex: 1;
    min-width: 0;
    border-radius: 12px;
    padding: 12px 6px;
    text-align: center;
    border: 1px solid transparent;
  }

  .next-hour-card.next-current {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,160,0.2);
  }

  .next-hour-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
  }

  .next-hour-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .next-hour-price {
    font-size: clamp(14px, 3.5vw, 20px);
    font-weight: 800;
    letter-spacing: -0.5px;
    font-family: 'Syne', sans-serif;
  }

  .next-hour-unit {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    margin-top: 2px;
  }

  footer {
    text-align: center;
    padding: 32px 0 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .hero { grid-template-columns: 1fr; }
    .price-tag { text-align: left; }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const API_BASE = '/api/prices';

let allData = [];
let chartInstance = null;
let currentTab = 'today';
let showFullCost = true;

// Fee constants (s/kWh, KM-ga)
const FEES = {
  marginaal:        0.5000,  // KM-ga (KM sees)
  vorgutasu_paev:   4.5800,  // KM-ga (KM sees), E-R 7-22
  vorgutasu_oo:     2.6000,  // KM-ga (KM sees), E-R 22-7 + L-P
  taastuvenergia:   1.0416,  // KM-ga (0.840 × 1.24)
  varustuskindlus:  0.9399,  // KM-ga (0.758 × 1.24)
  tasakaalustamine: 0.4625,  // KM-ga (0.373 × 1.24)
  aktsiis:          0.2604,  // KM-ga (0.210 × 1.24)
};

function isNightTariff(ts) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Europe/Tallinn', weekday: 'short', hour: 'numeric', hour12: false
  }).formatToParts(new Date(ts));
  const wd = parts.find(p => p.type === 'weekday').value;
  const h  = parseInt(parts.find(p => p.type === 'hour').value);
  if (wd === 'Sat' || wd === 'Sun') return true;
  return h < 7 || h >= 22;
}

function fixedExtras(ts) {
  const net = isNightTariff(ts) ? FEES.vorgutasu_oo : FEES.vorgutasu_paev;
  return FEES.marginaal + net + FEES.taastuvenergia + FEES.varustuskindlus + FEES.tasakaalustamine + FEES.aktsiis;
}

function displayPrice(nordpoolSenti, ts) {
  if (!showFullCost) return nordpoolSenti;
  return parseFloat((nordpoolSenti + fixedExtras(ts)).toFixed(1));
}

function setCostMode(full) {
  showFullCost = full;
  showInfo = false;
  const savedTab = currentTab;
  renderApp(allData);
  if (savedTab !== 'today') {
    const btn = document.querySelector(`.tab[onclick="switchTab('${savedTab}', this)"]`);
    if (btn) switchTab(savedTab, btn);
  }
}

function pad(n) { return String(n).padStart(2,'0'); }

function formatDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function formatDateEET(ts) {
  // Format timestamp as YYYY-MM-DD in EET (Europe/Tallinn)
  return new Date(ts).toLocaleDateString('sv-SE', { timeZone: 'Europe/Tallinn' });
}

function euroPerMWh_to_senti(v) {
  // EUR/MWh → senti/kWh (×0.1), with 24% VAT
  return (v * 0.1 * 1.24).toFixed(1);
}

function getColor(price) {
  const lo = showFullCost ? THRESH_FULL_LO : THRESH_SPOT_LO;
  const hi = showFullCost ? THRESH_FULL_HI : THRESH_SPOT_HI;
  if (price < lo) return getComputedStyle(document.documentElement).getPropertyValue('--cheap').trim();
  if (price < hi) return getComputedStyle(document.documentElement).getPropertyValue('--mid').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--expensive').trim();
}

// Fikseeritud pakett 8.629 s/kWh (KM-ta) × 1.24 = 10.700 s/kWh (KM-ga)
// Päev lävi: 10.700 + võrgutasu päev(4.58) + taastuvenergia(1.0416) + varustuskindlus(0.9399) + tasakaalustamine(0.4625) + aktsiis(0.2604) = 18.004
// Öö lävi:   10.700 + võrgutasu öö(2.60)  + taastuvenergia(1.0416) + varustuskindlus(0.9399) + tasakaalustamine(0.4625) + aktsiis(0.2604) = 16.004
const THRESH_FULL_REF_DAY   = 18.004;
const THRESH_FULL_REF_NIGHT = 16.004;
const THRESH_SPOT_LO  = 7;
const THRESH_SPOT_HI  = 17;
const THRESH_FULL_LO  = 15;
const THRESH_FULL_HI  = 25;

function getLevel(price) {
  const lo = showFullCost ? THRESH_FULL_LO : THRESH_SPOT_LO;
  const hi = showFullCost ? THRESH_FULL_HI : THRESH_SPOT_HI;
  if (price < lo) return { label: 'ODAV',    color: '#00e5a0', bg: 'rgba(0,229,160,0.1)' };
  if (price < hi) return { label: 'KESKMINE',color: '#f0c040', bg: 'rgba(240,192,64,0.1)' };
  return             { label: 'KALLIS',   color: '#ff5555', bg: 'rgba(255,85,85,0.1)' };
}

async function fetchPrices(start, end) {
  // Fetch with 2h buffer on both sides to cover EET (UTC+2)
  const url = `${API_BASE}?start=${encodeURIComponent(start+'T00:00:00.000Z')}&end=${encodeURIComponent(end+'T23:59:59.000Z')}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API viga: ' + res.status);
  const json = await res.json();
  const entries = json.data?.ee || json.data || [];
  return entries.map(d => ({
    ts: d.timestamp * 1000,
    price: d.price ?? 0
  }));
}

async function loadData() {
  const today = new Date();
  const past = new Date(today);
  past.setDate(past.getDate() - 6);
  const future = new Date(today);
  future.setDate(future.getDate() + 2);

  const raw = await fetchPrices(formatDate(past), formatDate(future));
  // Deduplicate - API returns 4x per hour (15min intervals) but price is same, keep first
  const hourly = {};
  raw.forEach(d => {
    const eetHour = new Date(d.ts).toLocaleString('sv-SE', { timeZone: 'Europe/Tallinn', hour: '2-digit', hour12: false }).slice(0,2);
    const key = `${formatDateEET(d.ts)}_${eetHour}`;
    if (!hourly[key]) hourly[key] = d;
  });
  return Object.values(hourly).sort((a,b) => a.ts - b.ts);
}

function filterByDay(data, dateStr) {
  return data.filter(d => formatDateEET(d.ts) === dateStr);
}

function renderApp(data) {
  const now = new Date();
  const todayStr = formatDateEET(now.getTime());
  const tomorrowStr = formatDateEET(now.getTime() + 86400000);

  const todayData = filterByDay(data, todayStr);
  const tomorrowData = filterByDay(data, tomorrowStr);

  // Current hour price
  const currentHour = now.getHours();
  const currentEntry = todayData.find(d => new Date(d.ts).getHours() === currentHour);
  const currentRaw = currentEntry ? currentEntry.price : null;
  const currentSenti = currentRaw !== null ? parseFloat(euroPerMWh_to_senti(currentRaw)) : null;

  // Stats for today
  const todayPrices = todayData.map(d => parseFloat(euroPerMWh_to_senti(d.price)));
  const minP = todayPrices.length ? Math.min(...todayPrices) : 0;
  const maxP = todayPrices.length ? Math.max(...todayPrices) : 0;
  const avgP = todayPrices.length ? (todayPrices.reduce((a,b)=>a+b,0)/todayPrices.length) : 0;

  const heroPriceSenti = currentEntry ? displayPrice(currentSenti, currentEntry.ts) : null;
  const level = heroPriceSenti !== null ? getLevel(heroPriceSenti) : { label: '–', color: '#4a6080', bg: 'transparent' };

  const hasTomorrow = tomorrowData.length >= 20 && tomorrowData.some(d => d.price > 0);

  document.getElementById('statusText').textContent = 'REAALAEG · ' + now.toLocaleTimeString('et-EE', {hour:'2-digit',minute:'2-digit'});

  const app = document.getElementById('appContent');
  app.innerHTML = `
    <div class="cost-toggle">
      <button class="cost-btn ${showFullCost && !showInfo ? 'active' : ''}" id="btnFull" onclick="setCostMode(true)">Kogukulu</button>
      <button class="cost-btn ${!showFullCost && !showInfo ? 'active' : ''}" id="btnSpot" onclick="setCostMode(false)">Börsihind</button>
      <button class="cost-btn ${showInfo ? 'active' : ''}" id="btnInfo" onclick="setInfoTab(true)">Info</button>
    </div>

    <div class="hero">
      <div>
        <div class="current-label">${showFullCost ? 'Praegune börsihind koos kõikide lisatasudega' : 'Praegune börsihind ilma lisatasudeta'} (${pad(currentHour)}:00–${pad(currentHour+1)}:00)</div>
        <div class="current-price" id="heroPriceVal" style="color:${level.color}">
          ${heroPriceSenti !== null ? heroPriceSenti : '–'}
          <span class="current-unit">s/kWh</span>
        </div>
        <div class="current-time">${now.toLocaleDateString('et-EE', {weekday:'long', day:'numeric', month:'long'})}</div>
      </div>
      <div class="price-tag">
        <div class="price-level" style="color:${level.color}; border-color:${level.color}; background:${level.bg}">${level.label}</div>
        <div class="change" style="color:${level.color};display:flex;align-items:center;gap:6px">${showFullCost && heroPriceSenti !== null ? `<svg width="18" height="14" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.75"><path d="M2 10h20M5 10l2-5h10l2 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="17" cy="13" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M9 5.5h2.5M14 3l1 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><span>100km = ${(heroPriceSenti * 18 / 100).toFixed(2)} €</span>` : ''}</div>
      </div>
    </div>



    <div class="chart-section">
      <div class="section-header">
        <div class="section-title">Hinnakõver</div>
        <div class="tabs">
          <button class="tab ${!hasTomorrow || currentTab==='today' ? 'active' : ''}" onclick="switchTab('today', this)">Täna</button>
          <button class="tab ${currentTab==='tomorrow' ? 'active' : ''}" onclick="switchTab('tomorrow', this)">Homme</button>
          <button class="tab ${currentTab==='week' ? 'active' : ''}" onclick="switchTab('week', this)">7 päeva</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <div class="hours-section" id="nextHoursSection">
      <div class="section-header">
        <div class="section-title">Järgmised 5 tundi</div>
      </div>
      <div class="next-hours" id="nextHoursGrid"></div>
    </div>

    <div id="infoPanel" style="display:none"></div>
  `;

  window._allData = data;
  window._todayStr = todayStr;
  window._tomorrowStr = tomorrowStr;
  window._currentHour = currentHour;
  window._currentFullSenti = heroPriceSenti;

  drawChart(todayData, 'Täna');
  drawHours(todayData, currentHour, true);
  drawNextHours([...todayData, ...tomorrowData], currentHour);
}

function clearTomorrowMsg() {
  const canvas = document.getElementById('priceChart');
  if (canvas) {
    canvas.style.display = '';
    const msg = canvas.parentElement && canvas.parentElement.querySelector('.tomorrow-msg');
    if (msg) msg.style.display = 'none';
  }
}

let showInfo = false;

function setInfoTab(on) {
  showInfo = on;
  const hero = document.querySelector('.hero');
  const chartSec = document.querySelector('.chart-section');
  const hoursSec = document.getElementById('nextHoursSection');
  const infoPanel = document.getElementById('infoPanel');
  if (!infoPanel) return;
  if (on) {
    if (hero) hero.style.display = 'none';
    if (chartSec) chartSec.style.display = 'none';
    if (hoursSec) hoursSec.style.display = 'none';
    infoPanel.style.display = '';
    renderInfoPanel();
  } else {
    if (hero) hero.style.display = '';
    if (chartSec) chartSec.style.display = '';
    if (hoursSec) hoursSec.style.display = '';
    infoPanel.style.display = 'none';
  }
  // update pill buttons
  const btnFull = document.getElementById('btnFull');
  const btnSpot = document.getElementById('btnSpot');
  const btnInfo = document.getElementById('btnInfo');
  if (btnFull) btnFull.classList.toggle('active', showFullCost && !on);
  if (btnSpot) btnSpot.classList.toggle('active', !showFullCost && !on);
  if (btnInfo) btnInfo.classList.toggle('active', on);
}

    { nimi: 'Võrgutasu öö (E-R 22–7, L-P)', vaartus: FEES.vorgutasu_oo.toFixed(3) },
    { nimi: 'Taastuvenergia tasu',           vaartus: FEES.taastuvenergia.toFixed(3) },
    { nimi: 'Varustuskindluse tasu',         vaartus: FEES.varustuskindlus.toFixed(3) },
    { nimi: 'Tasakaalustamine',              vaartus: FEES.tasakaalustamine.toFixed(3) },
    { nimi: 'Elektriaktsiis',                vaartus: FEES.aktsiis.toFixed(3) },
  ];

  const fiksPakett = 8.629;
  const fixedExtrasDay = FEES.taastuvenergia + FEES.varustuskindlus + FEES.tasakaalustamine + FEES.aktsiis + FEES.vorgutasu_paev;

  const dot = (color) =>

  const colorRow = (dotColor, label, numStr) =>

      ${dot(dotColor)}
      <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:${dotColor};min-width:72px">${label}</span>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text);min-width:84px">${numStr}</span>
    </div>`;

  panel.innerHTML = `
    <div style="margin-top:8px">
      <div class="section-title" style="margin-bottom:14px">Värvikoodid</div>

      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:10px;letter-spacing:0.8px;text-transform:uppercase">Kogukulu (s/kWh, KM-ga)</div>
      <div style="margin-bottom:20px">
        ${colorRow('#00e5a0', 'Odav',     '&lt; 15')}
        ${colorRow('#f0c040', 'Keskmine', '15 – 25')}
        ${colorRow('#ff5555', 'Kallis',   '&ge; 25')}
      </div>

      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:10px;letter-spacing:0.8px;text-transform:uppercase">Börsihind (s/kWh, KM-ga)</div>
      <div style="margin-bottom:24px">
        ${colorRow('#00e5a0', 'Odav',     '&lt; 7')}
        ${colorRow('#f0c040', 'Keskmine', '7 – 17')}
        ${colorRow('#ff5555', 'Kallis',   '&ge; 17')}
      </div>

      <div class="section-title" style="margin-bottom:14px">Tasude arvestus</div>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:10px">Kõik hinnad KM-ga (24%)</div>
      <table style="width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px">
        <thead>
          <tr style="color:var(--muted);border-bottom:1px solid #2a2a2a">
            <th style="text-align:left;padding:4px 0;font-weight:normal">Tasu</th>
            <th style="text-align:right;padding:4px 0;font-weight:normal">s/kWh</th>
          </tr>
        </thead>
        <tbody>
          ${feeRows.map(r => `
          <tr style="border-bottom:1px solid #1e1e1e">
            <td style="padding:7px 0;color:var(--text)">${r.nimi}</td>
            <td style="padding:7px 0;text-align:right;color:var(--accent);font-weight:bold">${r.vaartus}</td>
          </tr>`).join('')}
        </tbody>
      </table>



      <div class="section-title" style="margin:22px 0 10px">Elektriauto kulu arvestus</div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text);line-height:1.7">Tarbimise arvestus: 18 kWh/100km · 50 kWh akuga saab sõita 278 km</div>
    </div>

}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  if (tab === 'week') {
    clearTomorrowMsg();
    drawChart(window._allData, '7 päeva');
  } else if (tab === 'tomorrow') {
    const d = filterByDay(window._allData, window._tomorrowStr);
    const hasRealData = d.length >= 20 && d.some(x => x.price > 0);
    if (!hasRealData) {
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      const canvas = document.getElementById('priceChart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const wrap = canvas.parentElement;
      let msg = wrap.querySelector('.tomorrow-msg');
      if (!msg) {
        msg = document.createElement('div');
        msg.className = 'tomorrow-msg';
        wrap.appendChild(msg);
      }
      msg.style.display = 'flex';
      msg.innerHTML = 'Nord Pool homsed hinnad pole veel avaldatud';
      canvas.style.display = 'none';
      return;
    } else {
      const canvas = document.getElementById('priceChart');
      canvas.style.display = '';
      const msg = canvas.parentElement.querySelector('.tomorrow-msg');
      if (msg) msg.style.display = 'none';
    }
    drawChart(d, 'Homme');
  } else {
    clearTomorrowMsg();
    const d = filterByDay(window._allData, window._todayStr);
    drawChart(d, 'Täna');
  }
}

function drawChart(data, label) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  const now = new Date();
  const currentHour = now.getHours();

  const labels = data.map(d => {
    const dt = new Date(d.ts);
    if (label === '7 päeva') {
      return `${pad(dt.getDate())}.${pad(dt.getMonth()+1)} ${pad(dt.getHours())}h`;
    }
    return pad(dt.getHours()) + ':00';
  });

  const prices = data.map(d => displayPrice(parseFloat(euroPerMWh_to_senti(d.price)), d.ts));
  const colors = prices.map(p => getColor(p));

  // Find current position index for annotation (not for tomorrow)
  let currentIndex = -1;
  if (label === '7 päeva') {
    const nowTs = Date.now();
    let minDiff = Infinity;
    data.forEach((d, i) => {
      const diff = Math.abs(d.ts - nowTs);
      if (diff < minDiff) { minDiff = diff; currentIndex = i; }
    });
  } else if (label === 'Täna') {
    currentIndex = data.findIndex(d => new Date(d.ts).getHours() === currentHour);
  }

  // Custom plugin for vertical line
  const currentLinePlugin = {
    id: 'currentLine',
    afterDatasetsDraw(chart) {
      if (currentIndex < 0) return;
      const { ctx, scales: { x, y } } = chart;
      const xPos = x.getPixelForValue(currentIndex);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(xPos, y.top);
      ctx.lineTo(xPos, y.bottom);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
    }
  };

  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, 'rgba(0,229,160,0.3)');
  gradient.addColorStop(1, 'rgba(0,229,160,0)');

  // Kaks püsivat punktiirjoont kogukulu režiimis: päev (18.004) ja öö/nädalavahetus (16.004)
  const refLineDatasets = showFullCost ? [
    {
      label: 'Fikseeritud lävi päev',
      data: Array(prices.length).fill(THRESH_FULL_REF_DAY),
      type: 'line',
      borderColor: '#888888',
      borderWidth: 1.5,
      borderDash: [6, 4],
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      tension: 0,
      order: 0,
    },
    {
      label: 'Fikseeritud lävi öö',
      data: Array(prices.length).fill(THRESH_FULL_REF_NIGHT),
      type: 'line',
      borderColor: '#555555',
      borderWidth: 1,
      borderDash: [3, 5],
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      tension: 0,
      order: 0,
    }
  ] : [];

  chartInstance = new Chart(ctx, {
    type: 'bar',
    plugins: [currentLinePlugin],
    data: {
      labels,
      datasets: [
        {
          label: 'Hind (s/kWh)',
          data: prices,
          backgroundColor: colors.map(c => c + '99'),
          borderColor: colors,
          borderWidth: 1,
          borderRadius: 4,
          order: 1,
        },
        ...refLineDatasets
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111720',
          borderColor: '#1e2a38',
          borderWidth: 1,
          titleFont: { family: 'Space Mono', size: 11 },
          bodyFont: { family: 'Space Mono', size: 13 },
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0) return ` ${ctx.raw} s/kWh`;
              if (ctx.datasetIndex === 1) return ` ${ctx.raw.toFixed(2)} s/kWh (päev lävi)`;
              return ` ${ctx.raw.toFixed(2)} s/kWh (öö lävi)`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#4a6080',
            font: { family: 'Space Mono', size: 9 },
            maxRotation: 45,
            maxTicksLimit: label === '7 päeva' ? 14 : 24
          },
          grid: { color: 'rgba(255,255,255,0.03)' }
        },
        y: {
          ticks: {
            color: '#4a6080',
            font: { family: 'Space Mono', size: 10 },
            callback: v => v + ' s'
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          beginAtZero: true
        }
      }
    }
  });
}

function drawHours(data, currentHour, highlightCurrent) {
  const grid = document.getElementById('hoursGrid');
  if (!grid) return;

  if (data.length > 48) {
    // For week view, show daily averages instead
    const byDay = {};
    data.forEach(d => {
      const dt = new Date(d.ts);
      const key = formatDate(dt);
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(parseFloat(euroPerMWh_to_senti(d.price)));
    });
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(110px, 1fr))';
    grid.innerHTML = Object.entries(byDay).map(([day, prices]) => {
      const avg = (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(2);
      const col = getColor(parseFloat(avg));
      const bg = col + '22';
      const [y,m,d2] = day.split('-');
      const dt = new Date(day);
      const weekday = dt.toLocaleDateString('et-EE', {weekday:'short'});
      return `<div class="hour-cell" style="background:${bg}">
        <div class="hour-num">${weekday} ${d2}.${m}</div>
        <div class="hour-price" style="color:${col}">${avg}</div>
        <div class="hour-num">s/kWh</div>
      </div>`;
    }).join('');
    return;
  }

  grid.style.gridTemplateColumns = '';
  grid.innerHTML = data.map(d => {
    const dt = new Date(d.ts);
    const h = dt.getHours();
    const p = parseFloat(euroPerMWh_to_senti(d.price));
    const col = getColor(p);
    const bg = col + '22';
    const isCurrent = highlightCurrent && h === currentHour;
    return `<div class="hour-cell ${isCurrent ? 'current-hour' : ''}" style="background:${bg}">
      <div class="hour-num">${pad(h)}h</div>
      <div class="hour-price" style="color:${col}">${p}</div>
    </div>`;
  }).join('');
}

function drawNextHours(data, currentHour) {
  const section = document.getElementById('nextHoursSection');
  const grid = document.getElementById('nextHoursGrid');
  if (!grid) return;

  // Get current + next 4 hours (5 total) — timestamp-based to handle midnight crossover
  const upcoming = [];
  const nowTs = Date.now();
  const currentHourStart = new Date(nowTs);
  currentHourStart.setMinutes(0, 0, 0);
  for (let i = 0; i < 5; i++) {
    const slotTs = currentHourStart.getTime() + i * 3600000;
    const slotHour = new Date(slotTs).toLocaleString('sv-SE', { timeZone: 'Europe/Tallinn', hour: '2-digit', hour12: false }).slice(0, 2);
    const slotDate = new Date(slotTs).toLocaleDateString('sv-SE', { timeZone: 'Europe/Tallinn' });
    const entry = data.find(d => {
      const dDate = new Date(d.ts).toLocaleDateString('sv-SE', { timeZone: 'Europe/Tallinn' });
      const dHour = new Date(d.ts).toLocaleString('sv-SE', { timeZone: 'Europe/Tallinn', hour: '2-digit', hour12: false }).slice(0, 2);
      return dDate === slotDate && dHour === slotHour;
    });
    if (entry) upcoming.push({ hour: parseInt(slotHour), ts: entry.ts, price: displayPrice(parseFloat(euroPerMWh_to_senti(entry.price)), entry.ts), isCurrent: i === 0 });
  }

  if (!upcoming.length) { section.style.display = 'none'; return; }
  section.style.display = '';

  grid.innerHTML = upcoming.map((u, i) => {
    const col = getColor(u.price);
    const bg = col + '22';
    return `<div class="next-hour-card ${u.isCurrent ? 'next-current' : ''}" style="background:${bg}">
      ${u.isCurrent ? '<div class="next-hour-label">PRAEGU</div>' : '<div class="next-hour-label">&nbsp;</div>'}
      <div class="next-hour-time">${pad(u.hour)}:00</div>
      <div class="next-hour-price" style="color:${col}">${u.price}</div>
      <div class="next-hour-unit">s/kWh</div>
    </div>`;
  }).join('');
}


async function init() {
  try {
    const data = await loadData();
    if (!data.length) throw new Error('Andmed puuduvad');
    allData = data;
    renderApp(data);
  } catch (err) {
    document.getElementById('statusText').textContent = 'VIGA';
    document.getElementById('appContent').innerHTML = `
      <div class="error-msg">
        ⚠️ Andmete laadimine ebaõnnestus<br><br>
        ${err.message}<br><br>
        Elering API võib olla ajutiselt kättesaamatu.<br>
        Proovi lehte uuendada.
      </div>
    `;
  }
}

init();
// Refresh every 5 min
setInterval(init, 5 * 60 * 1000);

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
